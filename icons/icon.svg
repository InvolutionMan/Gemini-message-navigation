<?xml version="1.0" encoding="UTF-8"?>
<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.7" />
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="48" cy="48" r="46" fill="url(#grad1)" stroke="#ffffff" stroke-width="2"/>

  <!-- 导航图标 - 定位标记 -->
  <g transform="translate(48, 35)">
    <!-- 定位标记外框 -->
    <path d="M-12,-15 C-12,-22 12,-22 12,-15 L12,5 C12,12 0,20 0,20 C0,20 -12,12 -12,5 Z"
          fill="url(#grad2)" stroke="none"/>
    <!-- 定位标记内圆 -->
    <circle cx="0" cy="-8" r="5" fill="#667eea"/>
  </g>

  <!-- 消息气泡 -->
  <g transform="translate(48, 60)">
    <!-- 气泡主体 -->
    <rect x="-15" y="-8" width="30" height="16" rx="4" ry="4"
          fill="url(#grad2)" stroke="none"/>
    <!-- 气泡尾巴 -->
    <polygon points="-5,8 5,8 0,14" fill="url(#grad2)"/>
    <!-- 消息线条 -->
    <line x1="-8" y1="-3" x2="8" y2="-3" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="2" x2="4" y2="2" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- 装饰点 -->
  <circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="76" cy="20" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="20" cy="76" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="76" cy="76" r="2" fill="rgba(255,255,255,0.5)"/>
</svg>
