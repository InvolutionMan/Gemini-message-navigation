<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生成扩展图标</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 24px;
    }
    .icon-grid {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .icon-item {
      text-align: center;
    }
    .icon-item canvas {
      border: 2px solid #eee;
      border-radius: 12px;
      margin-bottom: 10px;
    }
    .icon-item p {
      color: #666;
      font-size: 14px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    .btn:active {
      transform: translateY(0);
    }
    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .status {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }
    .instructions {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
      font-size: 14px;
      color: #555;
      line-height: 1.6;
    }
    .instructions h3 {
      color: #333;
      margin-bottom: 10px;
    }
    .instructions ol {
      padding-left: 20px;
    }
    .instructions li {
      margin-bottom: 8px;
    }
    .instructions code {
      background: #e9ecef;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 生成扩展图标</h1>

    <div class="icon-grid">
      <div class="icon-item">
        <canvas id="icon48" width="48" height="48"></canvas>
        <p>48 x 48</p>
      </div>
      <div class="icon-item">
        <canvas id="icon96" width="96" height="96"></canvas>
        <p>96 x 96</p>
      </div>
    </div>

    <button class="btn" id="downloadBtn" onclick="downloadIcons()">
      📥 下载图标文件
    </button>

    <div class="status" id="status"></div>

    <div class="instructions">
      <h3>📋 使用说明：</h3>
      <ol>
        <li>点击上方的 "下载图标文件" 按钮</li>
        <li>会下载两个文件：<code>icon-48.png</code> 和 <code>icon-96.png</code></li>
        <li>将下载的文件移动到扩展的 <code>icons</code> 文件夹中</li>
        <li>替换原有的占位文件（如果有）</li>
        <li>重新加载扩展即可看到新图标</li>
      </ol>
    </div>
  </div>

  <script>
    // 绘制图标的函数
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      const scale = size / 96;

      // 清空画布
      ctx.clearRect(0, 0, size, size);

      // 绘制背景圆
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#667eea');
      gradient.addColorStop(1, '#764ba2');

      ctx.beginPath();
      ctx.arc(size/2, size/2, size/2 - 2*scale, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2 * scale;
      ctx.stroke();

      // 绘制定位标记
      ctx.save();
      ctx.translate(size/2, size * 0.36);
      ctx.scale(scale, scale);

      // 定位标记外框
      const markerGradient = ctx.createLinearGradient(-12, -15, 12, 20);
      markerGradient.addColorStop(0, 'rgba(255,255,255,0.9)');
      markerGradient.addColorStop(1, 'rgba(255,255,255,0.7)');

      ctx.beginPath();
      ctx.moveTo(-12, -15);
      ctx.bezierCurveTo(-12, -22, 12, -22, 12, -15);
      ctx.lineTo(12, 5);
      ctx.bezierCurveTo(12, 12, 0, 20, 0, 20);
      ctx.bezierCurveTo(0, 20, -12, 12, -12, 5);
      ctx.closePath();
      ctx.fillStyle = markerGradient;
      ctx.fill();

      // 定位标记内圆
      ctx.beginPath();
      ctx.arc(0, -8, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#667eea';
      ctx.fill();

      ctx.restore();

      // 绘制消息气泡
      ctx.save();
      ctx.translate(size/2, size * 0.63);
      ctx.scale(scale, scale);

      // 气泡主体
      const bubbleGradient = ctx.createLinearGradient(-15, -8, 15, 8);
      bubbleGradient.addColorStop(0, 'rgba(255,255,255,0.9)');
      bubbleGradient.addColorStop(1, 'rgba(255,255,255,0.7)');

      ctx.beginPath();
      ctx.roundRect(-15, -8, 30, 16, 4);
      ctx.fillStyle = bubbleGradient;
      ctx.fill();

      // 气泡尾巴
      ctx.beginPath();
      ctx.moveTo(-5, 8);
      ctx.lineTo(5, 8);
      ctx.lineTo(0, 14);
      ctx.closePath();
      ctx.fill();

      // 消息线条
      ctx.strokeStyle = '#667eea';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';

      ctx.beginPath();
      ctx.moveTo(-8, -3);
      ctx.lineTo(8, -3);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(-8, 2);
      ctx.lineTo(4, 2);
      ctx.stroke();

      ctx.restore();

      // 绘制装饰点
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      const dots = [
        [0.21, 0.21],
        [0.79, 0.21],
        [0.21, 0.79],
        [0.79, 0.79]
      ];
      dots.forEach(([x, y]) => {
        ctx.beginPath();
        ctx.arc(size * x, size * y, 2 * scale, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    // 绘制两个图标
    drawIcon(document.getElementById('icon48'), 48);
    drawIcon(document.getElementById('icon96'), 96);

    // 下载图标
    function downloadIcons() {
      const status = document.getElementById('status');
      const btn = document.getElementById('downloadBtn');

      btn.disabled = true;
      status.textContent = '正在生成图标...';

      try {
        // 下载 48x48 图标
        const canvas48 = document.getElementById('icon48');
        const link48 = document.createElement('a');
        link48.download = 'icon-48.png';
        link48.href = canvas48.toDataURL('image/png');
        link48.click();

        // 延迟下载第二个，避免浏览器阻止
        setTimeout(() => {
          // 下载 96x96 图标
          const canvas96 = document.getElementById('icon96');
          const link96 = document.createElement('a');
          link96.download = 'icon-96.png';
          link96.href = canvas96.toDataURL('image/png');
          link96.click();

          status.textContent = '✅ 图标已下载！请将文件移动到 icons 文件夹。';
          btn.disabled = false;
        }, 500);
      } catch (error) {
        status.textContent = '❌ 下载失败：' + error.message;
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
